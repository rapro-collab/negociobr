<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 4 - Slide 3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px; background: #F4F6F9;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .badge {
    position: absolute; top: 50px; right: 60px;
    background: #FFF3E8; color: #C24D00;
    padding: 10px 22px; border-radius: 30px;
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-size: 48px; font-weight: 900; color: #001F3F;
    margin-bottom: 55px; text-align: center; padding: 0 80px;
  }
  .visual {
    display: flex; align-items: center; gap: 25px; padding: 0 60px;
  }
  .company {
    width: 160px; height: 160px; border-radius: 18px;
    background: #FFFFFF; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    gap: 8px;
  }
  .company-icon { font-size: 55px; }
  .company-label {
    font-family: 'Inter', sans-serif;
    font-size: 16px; color: #64748B; font-weight: 700;
  }
  .plus {
    font-family: 'Inter', sans-serif;
    font-size: 50px; color: #0F4C81; font-weight: 800;
  }
  .equals {
    font-family: 'Inter', sans-serif;
    font-size: 50px; color: #FF6B00; font-weight: 800;
  }
  .result {
    background: linear-gradient(135deg, #0F4C81, #1E3A8A);
    padding: 35px 45px; border-radius: 22px; text-align: center;
    box-shadow: 0 8px 30px rgba(15,76,129,0.3);
  }
  .result-icon { font-size: 70px; margin-bottom: 12px; }
  .result-text {
    font-family: 'Inter', sans-serif;
    font-size: 26px; color: #FFFFFF; font-weight: 700; line-height: 1.3;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #0F4C81, #FF6B00);
  }
  .dots { position: absolute; bottom: 60px; display: flex; gap: 12px; }
  .dots span { width: 14px; height: 14px; border-radius: 50%; background: #CBD5E1; }
  .dots span.active { background: #FF6B00; width: 42px; border-radius: 7px; }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../Imagens/logo-fundo-transparente.png" alt="NegócioBR">
  <div class="badge">3 / 6</div>
  <div class="title">Como funciona o tráfego compartilhado?</div>
  <div class="visual">
    <div class="company">
      <div class="company-icon">🏪</div>
      <div class="company-label">Empresa 1</div>
    </div>
    <div class="plus">+</div>
    <div class="company">
      <div class="company-icon">🏬</div>
      <div class="company-label">Empresa 2</div>
    </div>
    <div class="plus">+</div>
    <div class="company">
      <div class="company-icon">🏢</div>
      <div class="company-label">Empresa 3</div>
    </div>
    <div class="equals">=</div>
    <div class="result">
      <div class="result-icon">💰</div>
      <div class="result-text">Custo dividido<br>para todos!</div>
    </div>
  </div>
  <div class="dots">
    <span></span><span></span><span class="active"></span><span></span><span></span><span></span>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
