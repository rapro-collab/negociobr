<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 4 - Slide 2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px; background: #FFFFFF;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .badge {
    position: absolute; top: 50px; right: 60px;
    background: #F4F6F9; color: #0F4C81;
    padding: 10px 22px; border-radius: 30px;
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
  }
  .question {
    font-family: 'Inter', sans-serif;
    font-size: 52px; font-weight: 900; color: #001F3F;
    text-align: center; padding: 0 80px; margin-bottom: 60px; line-height: 1.3;
  }
  .comparison { display: flex; gap: 35px; padding: 0 60px; width: 100%; }
  .comp-box {
    flex: 1; padding: 45px 35px; border-radius: 22px; text-align: center;
  }
  .comp-box.bad {
    background: #FEF2F2; border: 3px solid #FCA5A5;
  }
  .comp-box.good {
    background: #FFF3E8; border: 3px solid #FF6B00;
  }
  .comp-title {
    font-family: 'Inter', sans-serif;
    font-size: 30px; font-weight: 700; margin-bottom: 22px;
  }
  .comp-box.bad .comp-title { color: #DC2626; }
  .comp-box.good .comp-title { color: #FF6B00; }
  .comp-price {
    font-family: 'Inter', sans-serif;
    font-size: 50px; font-weight: 900; margin-bottom: 12px;
  }
  .comp-box.bad .comp-price { color: #DC2626; }
  .comp-box.good .comp-price { color: #FF6B00; }
  .comp-label {
    font-family: 'Roboto', sans-serif;
    font-size: 22px; color: #64748B;
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #0F4C81, #FF6B00);
  }
  .dots { position: absolute; bottom: 60px; display: flex; gap: 12px; }
  .dots span { width: 14px; height: 14px; border-radius: 50%; background: #CBD5E1; }
  .dots span.active { background: #FF6B00; width: 42px; border-radius: 7px; }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="badge">2 / 6</div>
  <div class="question">Quanto custa aparecer no Google?</div>
  <div class="comparison">
    <div class="comp-box bad">
      <div class="comp-title">❌ Sozinho</div>
      <div class="comp-price">R$ 2.000</div>
      <div class="comp-label">por mês</div>
    </div>
    <div class="comp-box good">
      <div class="comp-title">✅ Compartilhado</div>
      <div class="comp-price">R$ 99</div>
      <div class="comp-label">por mês</div>
    </div>
  </div>
  <div class="dots">
    <span></span><span class="active"></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
