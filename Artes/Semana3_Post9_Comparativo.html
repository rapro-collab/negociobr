<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 9 - Comparativo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px; background: #FFFFFF;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-size: 46px; font-weight: 900; color: #001F3F;
    margin-bottom: 45px; text-align: center;
  }
  .comparison { display: flex; gap: 35px; padding: 0 55px; width: 100%; }
  .comp-column { flex: 1; }
  .comp-header {
    padding: 28px; border-radius: 18px 18px 0 0; text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 30px; font-weight: 700; color: #FFFFFF;
  }
  .comp-column.bad .comp-header { background: #DC2626; }
  .comp-column.good .comp-header { background: #FF6B00; }
  .comp-items {
    background: #F4F6F9; padding: 35px 28px; border-radius: 0 0 18px 18px;
    display: flex; flex-direction: column; gap: 22px;
  }
  .comp-column.bad .comp-items { background: #FEF2F2; }
  .comp-column.good .comp-items { background: #FFF3E8; }
  .comp-item {
    display: flex; align-items: center; gap: 18px;
    font-family: 'Roboto', sans-serif;
    font-size: 22px; color: #1E293B; line-height: 1.4;
  }
  .comp-item-icon { font-size: 38px; flex-shrink: 0; }
  .bottom-cta {
    margin-top: 45px; text-align: center; padding: 35px 70px;
    background: linear-gradient(135deg, #0F4C81, #1E3A8A); border-radius: 18px;
  }
  .bottom-cta h2 {
    font-family: 'Inter', sans-serif;
    font-size: 40px; color: #FFFFFF; font-weight: 900; margin-bottom: 12px;
  }
  .bottom-cta p {
    font-family: 'Roboto', sans-serif;
    font-size: 24px; color: rgba(255,255,255,0.9);
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #0F4C81, #FF6B00);
  }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="title">Qual cenário você quer viver?</div>
  <div class="comparison">
    <div class="comp-column bad">
      <div class="comp-header">❌ Sem NegócioBR</div>
      <div class="comp-items">
        <div class="comp-item">
          <div class="comp-item-icon">😞</div>
          <div>Cliente pesquisa → não te encontra</div>
        </div>
        <div class="comp-item">
          <div class="comp-item-icon">🤷</div>
          <div>Você depende só de indicação</div>
        </div>
        <div class="comp-item">
          <div class="comp-item-icon">📵</div>
          <div>Telefone parado</div>
        </div>
      </div>
    </div>
    <div class="comp-column good">
      <div class="comp-header">✅ Com NegócioBR</div>
      <div class="comp-items">
        <div class="comp-item">
          <div class="comp-item-icon">🎯</div>
          <div>Cliente pesquisa → te encontra</div>
        </div>
        <div class="comp-item">
          <div class="comp-item-icon">📱</div>
          <div>WhatsApp tocando</div>
        </div>
        <div class="comp-item">
          <div class="comp-item-icon">💰</div>
          <div>Mais clientes, mais vendas</div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-cta">
    <h2>Escolha o seu lado</h2>
    <p>Link na bio para começar</p>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
