<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 1 - Slide 3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px; background: #F4F6F9;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .badge {
    position: absolute; top: 50px; right: 60px;
    background: #FFF3E8; color: #C24D00;
    padding: 10px 22px; border-radius: 30px;
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-size: 54px; font-weight: 900; color: #001F3F;
    margin-bottom: 55px;
  }
  .steps { display: flex; flex-direction: column; gap: 30px; padding: 0 70px; width: 100%; }
  .step {
    display: flex; align-items: center; gap: 25px;
    background: #FFFFFF; padding: 30px 35px; border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    border-left: 5px solid #FF6B00;
  }
  .step-num {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #FF6B00, #FA7000);
    color: white; font-family: 'Inter', sans-serif;
    font-size: 26px; font-weight: 800;
    display: flex; justify-content: center; align-items: center; flex-shrink: 0;
  }
  .step-text {
    font-family: 'Roboto', sans-serif;
    font-size: 25px; color: #334155; line-height: 1.4;
  }
  .step-text strong { color: #0F4C81; font-weight: 700; }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #FF6B00, #0F4C81);
  }
  .dots { position: absolute; bottom: 60px; display: flex; gap: 12px; }
  .dots span { width: 14px; height: 14px; border-radius: 50%; background: #CBD5E1; }
  .dots span.active { background: #FF6B00; width: 42px; border-radius: 7px; }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../Imagens/logo-fundo-transparente.png" alt="NegócioBR">
  <div class="badge">3 / 5</div>
  <div class="title">Como funciona?</div>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">A gente anuncia no <strong>Google Ads</strong> e o custo é dividido entre várias empresas</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Quando alguém pesquisa seu serviço, o <strong>NegócioBR aparece</strong></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">O cliente te chama direto no <strong>WhatsApp</strong> ou por <strong>ligação</strong> 📞</div>
    </div>
  </div>
  <div class="dots">
    <span></span><span></span><span class="active"></span><span></span><span></span>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
