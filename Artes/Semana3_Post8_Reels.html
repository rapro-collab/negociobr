<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 8 - Reels POV</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, #001F3F 0%, #0F4C81 50%, #1E3A8A 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 80px; left: 80px;
    height: 55px; width: auto;
  }
  .pov-title {
    font-family: 'Inter', sans-serif;
    font-size: 62px; font-weight: 900; color: #FFFFFF;
    text-align: center; margin-bottom: 70px; padding: 0 80px; line-height: 1.3;
  }
  .notifications { display: flex; flex-direction: column; gap: 35px; padding: 0 80px; width: 100%; }
  .notification {
    background: rgba(255,255,255,0.08); padding: 38px 48px; border-radius: 22px;
    display: flex; align-items: center; gap: 28px;
    border-left: 5px solid #FF6B00;
  }
  .notif-icon { font-size: 65px; }
  .notif-text {
    font-family: 'Roboto', sans-serif;
    font-size: 30px; color: #FFFFFF; font-weight: 500;
  }
  .reaction {
    margin-top: 70px; text-align: center;
    background: rgba(255,107,0,0.15); padding: 45px 55px; border-radius: 25px;
    border: 3px solid #FF6B00;
  }
  .reaction-text {
    font-family: 'Inter', sans-serif;
    font-size: 38px; color: #FFFFFF; font-weight: 700; margin-bottom: 18px;
  }
  .reaction-emoji { font-size: 90px; }
  .cta {
    position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: #FF6B00; color: #FFFFFF;
    font-family: 'Inter', sans-serif; font-size: 34px; font-weight: 700;
    padding: 28px 70px; border-radius: 50px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .deco-circle1 {
    position: absolute; top: -100px; right: -100px;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,107,0,0.08);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="deco-circle1"></div>
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="pov-title">POV: Você cadastrou sua empresa no NegócioBR</div>
  <div class="notifications">
    <div class="notification">
      <div class="notif-icon">📱</div>
      <div class="notif-text">Celular tocando sem parar</div>
    </div>
    <div class="notification">
      <div class="notif-icon">💬</div>
      <div class="notif-text">Notificações de WhatsApp chegando</div>
    </div>
  </div>
  <div class="reaction">
    <div class="reaction-text">"Gente, para, eu não dou conta!"</div>
    <div class="reaction-emoji">😅</div>
  </div>
  <div class="cta">Quer viver isso? 👇</div>
</div>
</body>
</html>
