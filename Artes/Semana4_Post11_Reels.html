<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 11 - Reels Planos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, #001F3F 0%, #0F4C81 50%, #1E3A8A 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 80px; left: 80px;
    height: 55px; width: auto;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-size: 62px; font-weight: 900; color: #FFFFFF;
    text-align: center; margin-bottom: 70px; padding: 0 80px; line-height: 1.2;
  }
  .plans { display: flex; flex-direction: column; gap: 40px; padding: 0 80px; width: 100%; }
  .plan {
    background: rgba(255,255,255,0.06); padding: 45px 55px; border-radius: 25px;
    text-align: center; position: relative;
  }
  .plan.popular {
    background: linear-gradient(135deg, rgba(255,107,0,0.12), rgba(250,112,0,0.12));
    border: 3px solid #FF6B00;
  }
  .plan-name {
    font-family: 'Inter', sans-serif;
    font-size: 40px; font-weight: 700; color: #FFFFFF; margin-bottom: 18px;
  }
  .plan-price {
    font-family: 'Inter', sans-serif;
    font-size: 68px; font-weight: 900; color: #FF6B00; margin-bottom: 12px;
  }
  .plan-period {
    font-family: 'Roboto', sans-serif;
    font-size: 24px; color: rgba(255,255,255,0.6); margin-bottom: 22px;
  }
  .plan-desc {
    font-family: 'Roboto', sans-serif;
    font-size: 26px; color: rgba(255,255,255,0.85);
  }
  .popular-badge {
    position: absolute; top: -14px; right: 28px;
    background: #FF6B00; color: #FFFFFF;
    padding: 8px 18px; border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 700;
  }
  .cta {
    position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: #FF6B00; color: #FFFFFF;
    font-family: 'Inter', sans-serif; font-size: 34px; font-weight: 700;
    padding: 28px 70px; border-radius: 50px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .deco-circle1 {
    position: absolute; top: -100px; right: -100px;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,107,0,0.08);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="deco-circle1"></div>
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="title">Qual plano combina com você?</div>
  <div class="plans">
    <div class="plan">
      <div class="plan-name">Básico</div>
      <div class="plan-price">R$ 99</div>
      <div class="plan-period">por mês</div>
      <div class="plan-desc">Pra quem tá começando e quer aparecer</div>
    </div>
    <div class="plan popular">
      <div class="popular-badge">MAIS POPULAR</div>
      <div class="plan-name">Profissional</div>
      <div class="plan-price">R$ 149</div>
      <div class="plan-period">por mês</div>
      <div class="plan-desc">Pra quem quer se destacar da concorrência</div>
    </div>
    <div class="plan">
      <div class="plan-name">Premium</div>
      <div class="plan-price">R$ 199</div>
      <div class="plan-period">por mês</div>
      <div class="plan-desc">Pra quem quer dominar a cidade</div>
    </div>
  </div>
  <div class="cta">Comenta 'PLANO' 👇</div>
</div>
</body>
</html>
