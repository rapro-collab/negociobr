<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 12 - Urgência</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px;
    background: linear-gradient(135deg, #001F3F 0%, #0F4C81 50%, #1E3A8A 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .warning-icon { font-size: 110px; margin-bottom: 35px; }
  .main-text { text-align: center; padding: 0 90px; z-index: 1; }
  .main-text h1 {
    font-family: 'Inter', sans-serif;
    font-size: 58px; font-weight: 900; color: #FFFFFF;
    line-height: 1.25; margin-bottom: 35px;
  }
  .main-text h1 span { color: #FF6B00; }
  .main-text p {
    font-family: 'Roboto', sans-serif;
    font-size: 30px; color: rgba(255,255,255,0.85);
    margin-bottom: 45px; line-height: 1.5;
  }
  .cta-btn {
    background: #FF6B00; color: #FFFFFF;
    font-family: 'Inter', sans-serif; font-size: 30px; font-weight: 700;
    padding: 24px 55px; border-radius: 50px; display: inline-block;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .deco-circle1 {
    position: absolute; top: -200px; right: -200px;
    width: 500px; height: 500px; border-radius: 50%;
    background: rgba(255,107,0,0.06);
  }
  .deco-circle2 {
    position: absolute; bottom: -150px; left: -150px;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #FF6B00, #FA7000, #FF6B00);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="deco-circle1"></div>
  <div class="deco-circle2"></div>
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="warning-icon">⚠️</div>
  <div class="main-text">
    <h1>Sua cidade tem dezenas de empresas. Mas quantas estão no <span>Google</span>?</h1>
    <p>Enquanto você lê isso, seu concorrente pode estar se cadastrando no NegócioBR. Não deixa ele aparecer antes de você.</p>
    <div class="cta-btn">Cadastre-se agora 🚀</div>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
