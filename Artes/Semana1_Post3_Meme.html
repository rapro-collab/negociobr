<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 3 - Meme</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px; background: #FFFFFF;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; padding: 60px;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .meme-container {
    width: 100%; display: flex; flex-direction: column; gap: 25px;
    margin-top: 40px;
  }
  .meme-line {
    display: flex; align-items: center; gap: 20px;
    background: #F4F6F9; padding: 30px 35px; border-radius: 18px;
    border-left: 5px solid #CBD5E1;
  }
  .meme-line.highlight {
    background: #FFF3E8; border-left-color: #FF6B00;
  }
  .meme-line.bad {
    background: #FEF2F2; border-left-color: #DC2626;
  }
  .meme-label {
    font-family: 'Inter', sans-serif;
    font-size: 26px; color: #64748B; font-weight: 700; min-width: 130px;
  }
  .meme-text {
    font-family: 'Roboto', sans-serif;
    font-size: 28px; color: #1E293B; flex: 1;
  }
  .meme-emoji { font-size: 55px; }
  .bottom-text {
    margin-top: 40px; text-align: center; padding: 35px 40px;
    background: linear-gradient(135deg, #0F4C81, #1E3A8A); border-radius: 18px;
    width: 100%;
  }
  .bottom-text h2 {
    font-family: 'Inter', sans-serif;
    font-size: 40px; color: #FFFFFF; font-weight: 900; margin-bottom: 12px;
  }
  .bottom-text p {
    font-family: 'Roboto', sans-serif;
    font-size: 25px; color: rgba(255,255,255,0.9);
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #0F4C81, #FF6B00);
  }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="meme-container">
    <div class="meme-line">
      <div class="meme-label">Cliente:</div>
      <div class="meme-text">"Vou procurar um serviço no Google"</div>
      <div class="meme-emoji">👨</div>
    </div>
    <div class="meme-line">
      <div class="meme-label">Você:</div>
      <div class="meme-text">*espera ansiosamente*</div>
      <div class="meme-emoji">😬</div>
    </div>
    <div class="meme-line bad">
      <div class="meme-label">Google:</div>
      <div class="meme-text">"Aqui estão 47 resultados do seu concorrente"</div>
      <div class="meme-emoji">📱</div>
    </div>
    <div class="meme-line bad">
      <div class="meme-label">Você:</div>
      <div class="meme-text">😭</div>
      <div class="meme-emoji">💔</div>
    </div>
  </div>
  <div class="bottom-text">
    <h2>Bora mudar essa história?</h2>
    <p>O NegócioBR te coloca na vitrine digital da sua cidade</p>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
