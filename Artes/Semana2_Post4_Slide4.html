<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 4 - Slide 4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px; background: #FFFFFF;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .badge {
    position: absolute; top: 50px; right: 60px;
    background: #F4F6F9; color: #0F4C81;
    padding: 10px 22px; border-radius: 30px;
    font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-size: 46px; font-weight: 900; color: #001F3F;
    margin-bottom: 45px; text-align: center; padding: 0 80px;
  }
  .steps { display: flex; flex-direction: column; gap: 25px; padding: 0 70px; width: 100%; }
  .step {
    display: flex; align-items: center; gap: 22px;
    background: #F4F6F9; padding: 28px 32px; border-radius: 18px;
    border-left: 5px solid #0F4C81;
  }
  .step-num {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #0F4C81, #1E3A8A);
    color: #FFFFFF;
    font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800;
    display: flex; justify-content: center; align-items: center; flex-shrink: 0;
  }
  .step-text {
    font-family: 'Roboto', sans-serif;
    font-size: 24px; color: #334155; line-height: 1.4;
  }
  .step-text strong { color: #0F4C81; font-weight: 700; }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #0F4C81, #FF6B00);
  }
  .dots { position: absolute; bottom: 60px; display: flex; gap: 12px; }
  .dots span { width: 14px; height: 14px; border-radius: 50%; background: #CBD5E1; }
  .dots span.active { background: #FF6B00; width: 42px; border-radius: 7px; }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="badge">4 / 6</div>
  <div class="title">O passo a passo:</div>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Várias empresas da mesma região <strong>dividem o custo</strong> do anúncio no Google</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Quando alguém pesquisa seu serviço, o <strong>NegócioBR aparece</strong> nos resultados</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">O cliente vê sua empresa e te chama direto no <strong>WhatsApp</strong> ou <strong>ligação</strong></div>
    </div>
  </div>
  <div class="dots">
    <span></span><span></span><span></span><span class="active"></span><span></span><span></span>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
