<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Post 6 - Frase de Impacto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .slide {
    width: 1080px; height: 1080px;
    background: linear-gradient(135deg, #001F3F 0%, #0F4C81 50%, #1E3A8A 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    font-family: 'Roboto', sans-serif;
  }
  .logo {
    position: absolute; top: 50px; left: 60px;
    height: 50px; width: auto;
  }
  .quote-container { text-align: center; padding: 0 100px; z-index: 1; }
  .quote-mark {
    font-family: 'Inter', sans-serif;
    font-size: 140px; color: rgba(255,107,0,0.25); line-height: 1; margin-bottom: -40px;
  }
  .quote-text {
    font-family: 'Inter', sans-serif;
    font-size: 60px; font-weight: 900; color: #FFFFFF;
    line-height: 1.3; margin-bottom: 45px;
  }
  .quote-text span { color: #FF6B00; }
  .bottom-text {
    position: absolute; bottom: 140px; text-align: center; padding: 0 80px;
  }
  .bottom-text p {
    font-family: 'Roboto', sans-serif;
    font-size: 28px; color: rgba(255,255,255,0.85); margin-bottom: 28px;
  }
  .cta-btn {
    background: #FF6B00; color: #FFFFFF;
    font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 700;
    padding: 20px 48px; border-radius: 50px; display: inline-block;
  }
  .deco-circle1 {
    position: absolute; top: -200px; right: -200px;
    width: 500px; height: 500px; border-radius: 50%;
    background: rgba(255,107,0,0.06);
  }
  .deco-circle2 {
    position: absolute; bottom: -150px; left: -150px;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .accent-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
    background: linear-gradient(90deg, #FF6B00, #FA7000);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="deco-circle1"></div>
  <div class="deco-circle2"></div>
  <img class="logo" src="../Imagens/logo-fundo-branco.png" alt="NegócioBR">
  <div class="quote-container">
    <div class="quote-mark">"</div>
    <div class="quote-text">Seu cliente já está te <span>procurando</span>.<br>A pergunta é: ele te <span>encontra</span>?</div>
  </div>
  <div class="bottom-text">
    <p>Todo dia, milhares de pessoas pesquisam serviços na sua cidade no Google</p>
    <div class="cta-btn">Apareça no Google →</div>
  </div>
  <div class="accent-bar"></div>
</div>
</body>
</html>
